openapi: 3.0.0
info:
  title: Expo Project API
  description: API documentation for the Expo Project application
  version: 1.0.0
  contact:
    name: API Support
    email: support@expo-project.com

servers:
  - url: http://localhost:8000/api
    description: Local development server
  - url: https://api.expo-project.com/api
    description: Production server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Expo:
      type: object
      properties:
        id:
          type: integer
        name_en:
          type: string
        name_ar:
          type: string
        description_en:
          type: string
        description_ar:
          type: string
        background_color:
          type: string
        background_image:
          type: string
        banner_image:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        status:
          type: string
          enum: [active, upcoming, ended, cancelled]
        vendor_slot_capacity:
          type: integer
        product_capacity_per_slot:
          type: integer
        slot_pricing:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ExpoVendor:
      type: object
      properties:
        id:
          type: integer
        expo_id:
          type: integer
        vendor_id:
          type: integer
        vendor_name:
          type: string
        logo_url:
          type: string
        is_premium:
          type: boolean
        booth_number:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Product:
      type: object
      properties:
        id:
          type: integer
        vendor_id:
          type: integer
        category_id:
          type: integer
        name_en:
          type: string
        name_ar:
          type: string
        description_en:
          type: string
        description_ar:
          type: string
        price:
          type: number
          format: float
        discount_price:
          type: number
          format: float
        images:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, inactive, out_of_stock]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Ad:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        image_url:
          type: string
        link_url:
          type: string
        type:
          type: string
          enum: [banner, popup, sidebar]
        status:
          type: string
          enum: [active, inactive]
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Review:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        product_id:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/User'
        product:
          $ref: '#/components/schemas/Product'

    CartItem:
      type: object
      properties:
        id:
          type: integer
        product_id:
          type: integer
        quantity:
          type: integer
        price:
          type: number
          format: float
        product:
          $ref: '#/components/schemas/Product'

    Cart:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        vendor_id:
          type: integer
        status:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        total:
          type: number
          format: float

    Order:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        vendor_id:
          type: integer
        order_number:
          type: string
        total_amount:
          type: number
          format: float
        status:
          type: string
          enum: [pending, confirmed, processing, shipped, delivered, cancelled]
        payment_status:
          type: string
          enum: [pending, paid, failed, refunded]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WishlistItem:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        product_id:
          type: integer
        created_at:
          type: string
          format: date-time
        product:
          $ref: '#/components/schemas/Product'

    Notification:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        title:
          type: string
        message:
          type: string
        type:
          type: string
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time

    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errors:
          type: object

paths:
  # Banner Ads
  /banner-ads:
    get:
      tags:
        - Ads
      summary: Get all active banner ads
      responses:
        '200':
          description: A list of active banner ads
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Ad'
                  message:
                    type: string

  # Expo Endpoints
  /expo-vendors/{expoId}:
    get:
      tags:
        - Expo Vendors
      summary: Get expo vendors list with logo
      parameters:
        - name: expoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of expo vendors
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExpoVendor'

  /expo-featured-vendors/{expoId}:
    get:
      tags:
        - Expo Vendors
      summary: Get premium expo vendors list
      parameters:
        - name: expoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of premium expo vendors
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExpoVendor'

  /expo-products/{expoId}/{vendorId}:
    get:
      tags:
        - Products
      summary: Get expo products with filters
      parameters:
        - name: expoId
          in: path
          required: true
          schema:
            type: integer
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
        - name: category_id
          in: query
          required: false
          schema:
            type: integer
        - name: min_price
          in: query
          required: false
          schema:
            type: number
        - name: max_price
          in: query
          required: false
          schema:
            type: number
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            enum: [price_low, price_high, name, newest]
      responses:
        '200':
          description: List of expo products
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'

  /expo-details/{expoId}:
    get:
      tags:
        - Expo
      summary: Get expo details with reviews
      parameters:
        - name: expoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Expo details with reviews
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Expo'
        '404':
          description: Expo not found

  # Reviews
  /reviews/product/{productId}:
    get:
      tags:
        - Reviews
      summary: Get product reviews (public)
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of product reviews
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Review'

  # Protected Endpoints (require authentication)
  /notifications:
    get:
      tags:
        - Notifications
      summary: Get user notifications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of user notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'

  /cart:
    get:
      tags:
        - Cart
      summary: Get cart items
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current cart details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'

  /cart/add:
    post:
      tags:
        - Cart
      summary: Add item to cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - product_id
                - quantity
              properties:
                product_id:
                  type: integer
                quantity:
                  type: integer
                  minimum: 1
      responses:
        '201':
          description: Item added to cart successfully
        '422':
          description: Validation error

  /cart/update/{id}:
    put:
      tags:
        - Cart
      summary: Update cart item
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: Cart item updated successfully
        '404':
          description: Cart item not found

  /cart/remove/{id}:
    delete:
      tags:
        - Cart
      summary: Remove cart item
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Cart item removed successfully
        '404':
          description: Cart item not found

  /cart/clear:
    delete:
      tags:
        - Cart
      summary: Clear entire cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cart cleared successfully

  /wishlist:
    get:
      tags:
        - Wishlist
      summary: Get wishlist items
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of wishlist items
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WishlistItem'

  /wishlist/add:
    post:
      tags:
        - Wishlist
      summary: Add to wishlist
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - product_id
              properties:
                product_id:
                  type: integer
      responses:
        '201':
          description: Item added to wishlist successfully
        '422':
          description: Validation error

  /wishlist/remove/{id}:
    delete:
      tags:
        - Wishlist
      summary: Remove from wishlist
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Item removed from wishlist successfully
        '404':
          description: Wishlist item not found

  /orders:
    get:
      tags:
        - Orders
      summary: Get current orders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of current orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'

  /past-orders:
    get:
      tags:
        - Orders
      summary: Get past orders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of past orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'

  /orders/{id}:
    get:
      tags:
        - Orders
      summary: Get specific order
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Order'
        '404':
          description: Order not found

  /orders/place:
    post:
      tags:
        - Orders
      summary: Place new order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - address_id
                - payment_method
              properties:
                address_id:
                  type: integer
                payment_method:
                  type: string
                  enum: [cash_on_delivery, credit_card, paypal]
                notes:
                  type: string
      responses:
        '201':
          description: Order placed successfully
        '422':
          description: Validation error

  /orders/cancel/{id}:
    post:
      tags:
        - Orders
      summary: Cancel order
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Order cancelled successfully
        '404':
          description: Order not found
        '422':
          description: Order cannot be cancelled

  /checkout:
    post:
      tags:
        - Checkout
      summary: Checkout process
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - address_id
              properties:
                address_id:
                  type: integer
                coupon_code:
                  type: string
      responses:
        '200':
          description: Checkout details
        '422':
          description: Validation error

  /checkout/confirm:
    post:
      tags:
        - Checkout
      summary: Confirm checkout
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - payment_method
              properties:
                payment_method:
                  type: string
                  enum: [cash_on_delivery, credit_card, paypal]
                payment_details:
                  type: object
      responses:
        '201':
          description: Order confirmed successfully
        '422':
          description: Validation error

  /reviews:
    get:
      tags:
        - Reviews
      summary: Get user reviews
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of user reviews
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Review'
    post:
      tags:
        - Reviews
      summary: Create a new review
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - product_id
                - rating
              properties:
                product_id:
                  type: integer
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                comment:
                  type: string
      responses:
        '201':
          description: Review created successfully
        '422':
          description: Validation error

  /reviews/{id}:
    get:
      tags:
        - Reviews
      summary: Get specific review
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Review details
        '404':
          description: Review not found
    put:
      tags:
        - Reviews
      summary: Update a review
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                comment:
                  type: string
      responses:
        '200':
          description: Review updated successfully
        '404':
          description: Review not found
    delete:
      tags:
        - Reviews
      summary: Delete a review
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Review deleted successfully
        '404':
          description: Review not found
